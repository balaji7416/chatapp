server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=30s;

    # Proxy API requests to backend
    location /api/ {
        # Using variable prevents Nginx from crashing if backend is down on startup
        set $backend chatapp-backend;
        
        proxy_pass http://$backend:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed for API)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Proxy all other requests to frontend
    location / {
        set $frontend chatapp-frontend;
        
        proxy_pass http://$frontend:80;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
